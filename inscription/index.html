<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscription - Dream Bag & Heel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="inscription.css">
</head>
<body>

  <div class="bg-black text-white text-center py-3 text-sm font-medium tracking-wide">
    PROMO SPÉCIALE : -20% sur tous les Mocassins • Livraison gratuite dès 700€ et 101 000DA
  </div>

  <nav class="sticky top-0 z-50 py-4 bg-transparent">
    <div class="max-w-7xl mx-auto px-6">
      <div class="bg-[#fff9f0] rounded-3xl shadow-md flex items-center justify-between px-10 py-4">
        <a href="../index.html">
          <img src="../../im/pp.png" alt="Dream Bag & Heel" class="h-16 w-auto object-contain">
        </a>
        <div class="flex items-center gap-10 text-base font-medium text-gray-700">
          <a href="../" class="hover:text-[#d4a373] transition">Accueil</a>
          <a href="../produits/" class="hover:text-[#d4a373] transition">Collection</a>
          <a href="../#apropos" class="hover:text-[#d4a373] transition">À propos</a>
          <a href="../#contact" class="hover:text-[#d4a373] transition">Contact</a>
          <a href="../commande/" class="hover:text-brown-600">commande</a>
          <a href="./" class="hover:text-brown-600">Inscrire</a>
        </div>
        <div class="flex items-center gap-6 text-2xl text-gray-700">
          <i class="fas fa-heart cursor-pointer hover:text-[#d4a373] transition" onclick="window.location.href='../favoris/'"></i>
          <a href="../panier/" class="relative hover:text-[#d4a373] transition">
            <i class="fas fa-shopping-bag cursor-pointer"></i>
            <span id="cart-badge" class="text-xs bg-[#d4a373] text-white rounded-full px-1.5 py-0.5 absolute -top-3 -right-3 text-[10px]">0</span>
          </a>
          <i class="fas fa-user cursor-pointer hover:text-[#d4a373] transition" onclick="window.location.href='../login/'"></i>
        </div>
      </div>
    </div>
  </nav>

  <div class="background">
    <div class="register-card">
      <h1>Inscription</h1>
      <p class="subtitle">Créer votre compte</p>
      <form id="registerForm">
        <div class="input-group">
          <input type="text" id="nom" placeholder="Nom complet" required>
        </div>
        <div class="input-group">
          <input type="email" id="email" placeholder="Adresse email" required>
        </div>
        <div class="input-group password-group">
          <input type="password" id="password" placeholder="Mot de passe" required>
          <span class="toggle-password">👁</span>
        </div>
        <div class="input-group password-group">
          <input type="password" id="confirm-password" placeholder="Confirmez le mot de passe" required>
          <span class="toggle-password">👁</span>
        </div>
        <button type="submit" class="btn-register">S'inscrire</button>
      </form>
      <div class="login-link">
        <button onclick="window.location.href='../login/'" class="btn-login">Se connecter</button>
      </div>
    </div>
  </div>

  <script src="inscription.js"></script>
  <script>
    const cart = JSON.parse(localStorage.getItem('cart') || '[]');
    document.getElementById('cart-badge').textContent =
      cart.reduce((s, i) => s + (i.quantity || 1), 0);
  </script>
</body>
</html>
